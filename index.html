<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0a0f0a" />
<title>AN SPORTS LIVE TV</title>
<link rel="manifest" href="manifest.json" />
<link rel="stylesheet" href="style.css" />
<link rel="apple-touch-icon" href="https://dummyimage.com/192x192/00e676/0a0f0a&text=AN" />
</head>
<body>

  <!-- Splash -->
  <div id="splash" class="splash">
    <div class="splash-logo">
      <span class="t1">AN SPORTS</span>
      <span class="t2">LIVE TV</span>
    </div>
    <div class="spinner"></div>
  </div>

  <!-- Header -->
  <header class="topbar">
    <div class="brand" id="homeBtn">
      <span class="brand-1">AN SPORTS</span>
      <span class="brand-2">LIVE TV</span>
    </div>
    <div class="top-actions">
      <button class="icon-btn" id="favBtn" title="Favorites">★</button>
      <a class="icon-btn" href="admin.html" title="Admin">⚙</a>
    </div>
  </header>

  <!-- LED Ticker -->
  <div class="ticker-wrap" id="tickerWrap" style="display:none;">
    <div class="ticker" id="ticker"></div>
  </div>

  <!-- Search -->
  <div class="search-bar">
    <input id="searchInput" type="text" placeholder="Search by name, category, country..." />
  </div>

  <!-- Category chips -->
  <div class="chips" id="categoryChips">
    <button class="chip active" data-cat="All">All</button>
    <button class="chip" data-cat="Sports">Sports</button>
    <button class="chip" data-cat="News">News</button>
    <button class="chip" data-cat="Entertainment">Entertainment</button>
    <button class="chip" data-cat="Movies">Movies</button>
    <button class="chip" data-cat="Kids">Kids</button>
    <button class="chip" data-cat="Music">Music</button>
  </div>

  <!-- Featured -->
  <section id="featuredSection" class="section" style="display:none;">
    <h2 class="section-title">Featured</h2>
    <div class="featured-row" id="featuredRow"></div>
  </section>

  <!-- Channels grid -->
  <main>
    <h2 class="section-title" id="gridTitle">All Channels</h2>
    <div class="grid" id="channelGrid"></div>
    <div id="emptyState" class="empty" style="display:none;">No channels found.</div>
  </main>

  <!-- Player Modal -->
  <div id="playerModal" class="player-modal">
    <div class="player-inner">
      <div class="player-head">
        <span id="playerTitle">Channel</span>
        <button class="icon-btn" id="closePlayer">✕</button>
      </div>
      <div class="video-wrap" id="videoWrap">
        <video id="video" playsinline></video>
        <div class="video-loader" id="videoLoader"><div class="spinner"></div></div>
      </div>
      <div class="controls">
        <button class="ctrl" id="btnPlay">▶</button>
        <button class="ctrl" id="btnPause">⏸</button>
        <button class="ctrl" id="btnStop">⏹</button>
        <button class="ctrl" id="btnMute">🔊</button>
        <input id="volume" type="range" min="0" max="1" step="0.05" value="1" />
        <button class="ctrl" id="btnRetry">⟳</button>
        <button class="ctrl" id="btnFull">⛶</button>
      </div>
      <div class="player-status" id="playerStatus"></div>
    </div>
  </div>

  <!-- Exit confirm -->
  <div id="exitModal" class="confirm-modal">
    <div class="confirm-box">
      <p>Exit AN SPORTS LIVE TV?</p>
      <div class="confirm-actions">
        <button id="exitYes" class="btn-danger">Exit</button>
        <button id="exitNo" class="btn-ghost">Stay</button>
      </div>
    </div>
  </div>

  <!-- Firebase compat SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  <!-- HLS.js -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>

  <script src="firebase.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(()=>{});
    }
  </script>
</body>
</html>
